generate_style_bible_task:
  description: >
    Generate a complete Deck Style Bible JSON for a tarot deck with the
    following creative direction. Any field that reads "(not specified — infer
    from art style and mood)" was not provided by the user; infer it from the
    art style and mood.

    Art Style: {style} Mood: {mood} Color Palette Hints: {palette} Wands Suit
    Association: {suit_wands} Cups Suit Association: {suit_cups} Swords Suit
    Association: {suit_swords} Pentacles Suit Association: {suit_pentacles}

    Produce a single JSON object with no markdown, no commentary, and no text
    outside the JSON. The JSON must conform to this exact structure: -
    global_style_rules: object with keys art_style, mood, lighting, composition,
      color_temperature, rendering_technique — all derived from the creative
    direction above - suit_systems: object with four suit keys (wands, cups,
    swords, pentacles), each containing
      palette, lighting, motif, and energy — use the suit association overrides
    if provided,
      otherwise infer from the art style and mood
    - major_arcana_rules: object with figure_style, symbolism_approach,
    background_complexity,
      and archetypal_realism (always set to true)
    - prompt_prefix: a concise string that will be prepended to every image
    generation prompt
      in the deck, capturing the core visual style
    - avoid_terms: array of strings — MUST unconditionally include all of the
    following:
      "text", "words", "letters", "watermark", "logo", "extra limbs", "extra
    fingers",
      "deformed hands", "blurry", "low quality" — you may append additional
    terms appropriate
      to the style/mood but must never omit these ten

  expected_output: >
    A single valid JSON object conforming to the StyleBible schema. No markdown
    fences, no explanatory text, no keys outside the schema. The object must
    contain: global_style_rules (6 keys), suit_systems (4 suits × 4 keys each),
    major_arcana_rules (4 keys with archetypal_realism: true), prompt_prefix
    (non-empty string), and avoid_terms (array containing at minimum the 10
    mandatory guardrail terms).

  agent: style_bible_agent

generate_concept_task:
  description: >
    Generate a structured visual concept for this tarot card. Card identity:
    card_id={card_id}, card_name={card_name}, arcana={arcana}, suit={suit},
    meaning_keywords={meaning_keywords}.

    Use the Style Bible from context. For Minor Arcana (suit is not empty):
    apply suit_systems[suit].motif and suit_systems[suit].energy to
    symbolic_elements; keep composition_notes standard. For Major Arcana (suit
    is empty): reflect archetypal symbolism of the card; composition_notes must
    reference major_arcana_rules.figure_style.

    Do not add fantasy effects unless the Style Bible explicitly allows them.
    Keep background complexity minimal. Limit symbolic_elements to at most three
    items. Output strict JSON only — no markdown, no commentary.
  expected_output: >
    A single valid JSON object conforming to the CardConcept schema: card_id,
    symbolic_elements (max 3), composition_notes, prompt_string (may be empty;
    filled later). No markdown fences, no explanatory text.
  agent: concept_agent

build_prompt_task:
  description: >
    Assemble the final image generation prompt in this strict order, joining
    every segment with ", " (comma-space). (1) StyleBible.prompt_prefix. (2) For
    Minor Arcana: suit_systems[suit].palette and suit_systems[suit].lighting;
    for Major Arcana: major_arcana_rules.figure_style. (3) Visual scene: ",
    ".join(symbolic_elements), then ", ", then composition_notes. (4) "avoid: "
    plus ", ".join(StyleBible.avoid_terms).

    Output only the single continuous prompt string. No JSON, no markdown, no
    newlines, no bullet points, no commentary.
  expected_output: >
    A single continuous prompt string with no JSON structure, no markdown
    formatting, and no newline characters. All segments joined by ", ".
  agent: prompt_agent

generate_image_task:
  description: >
    Using prompt_string {prompt_string}, card_id {card_id}, and attempt_number
    {attempt_number}, call the image generation API with the exact prompt string
    unmodified. Save the resulting PNG to disk and return only the saved file
    path — no evaluation, no retry logic, no extra text.
  expected_output: >
    A single file path string pointing to the saved PNG (e.g.
    output/images/{card_id}_attempt_{attempt_number}.png). No JSON, no markdown,
    no extra text.
  agent: image_agent

evaluate_image_task:
  description: >
    Evaluate the tarot card image at {image_path} for card_id {card_id},
    attempt_number {attempt_number}, against card_concept {card_concept} and
    style_bible {style_bible}. Score suit_compliance, global_style,
    meaning_alignment, and technical_quality (0–10 each). Detect artifacts
    (watermarks, extra limbs/fingers, deformed hands, blurry rendering). Return
    only a JSON object matching the EvaluationVerdict schema.
  expected_output: >
    A JSON object matching the EvaluationVerdict schema with all required fields
    populated: card_id, attempt_number, passed (bool), subscores (dict with keys
    suit_compliance, global_style, meaning_alignment, technical_quality — each
    0–10), and prompt_patch (string; empty if passed=true). No markdown, no
    prose, no extra fields.
  agent: evaluator_agent

repair_prompt_task:
  description:
    Revise the failing image generation prompt based on the evaluation verdict.
    Apply surgical edits on attempt 1, reduce background complexity on attempt
    2, and use safe mode (single subject, minimal background, 1 symbol) on
    attempt 3 and beyond. Output the revised prompt string only.
  expected_output:
    A single revised prompt string with no markdown, no JSON, and no commentary.
  agent: repair_agent

orchestrate_deck_task:
  description:
    Orchestrate the sequential generation of all 78 tarot cards through the full
    pipeline. Generate the Style Bible once, then process each card through
    concept generation, prompt construction, image generation, evaluation, and
    repair as needed. Enforce max_retries per card and preserve the best
    attempt. Output the results manifest JSON.
  expected_output:
    A valid JSON object mapping each card_id to a CardResult entry containing
    concept, initial_prompt, best_attempt_path, total_attempts, and
    final_verdict.
  agent: orchestrator_agent
